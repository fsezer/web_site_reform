server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /.well-known/security.txt {
        include /etc/nginx/snippets/security-headers.conf;
        default_type text/plain;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location = /.well-known/assetlinks.json {
        include /etc/nginx/snippets/security-headers.conf;
        default_type application/json;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location = /.well-known/apple-app-site-association {
        include /etc/nginx/snippets/security-headers.conf;
        default_type application/json;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # HTML: short cache; assets fingerprinted by Vite get longer TTL below
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    location = /login {
        include /etc/nginx/snippets/security-headers.conf;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store";
        try_files /login.html =404;
    }

    location = /Admin {
        include /etc/nginx/snippets/security-headers.conf;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store";
        try_files /admin.html =404;
    }

    location = /admin {
        return 301 /Admin;
    }

    location = /login.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store";
    }

    location = /admin.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store";
    }

    location = /admin.webmanifest {
        include /etc/nginx/snippets/security-headers.conf;
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location = /sw-admin.js {
        include /etc/nginx/snippets/security-headers.conf;
        default_type application/javascript;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    location /content/ {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri.html /content.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    location = /content.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml;
    gzip_min_length 256;
}

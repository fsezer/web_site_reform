<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Giriş — Sanas Technology</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Sanas Admin" />
    <link rel="manifest" href="/admin.webmanifest" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/css/main.css" />
  </head>
  <body class="auth-shell" data-page="login">
    <main class="auth-main">
      <a class="auth-brand" href="/index.html" aria-label="Sanas Technology">
        <img src="/img/brand/logo-full.png" alt="Sanas Technology" width="822" height="264" />
      </a>
      <div class="auth-card">
        <h1 class="auth-title">Yönetim girişi</h1>
        <p class="auth-lead">Yalnızca yetkili Google hesapları</p>
        <p class="auth-error" data-login-error hidden></p>
        <button type="button" class="auth-google" data-google-login>
          <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
            <path fill="#EA4335" d="M9 7.2v3.6h5.1c-.2 1.2-.9 2.2-1.9 2.9l3.1 2.4c1.8-1.7 2.8-4.1 2.8-7 0-.7-.1-1.3-.2-1.9H9z" />
            <path fill="#34A853" d="M4 10.7l-.7.5-2.3 1.8C2.5 15.7 5.5 18 9 18c2.4 0 4.4-.8 5.9-2.1l-3.1-2.4c-.8.6-1.9.9-2.8.9-2.2 0-4-1.5-4.7-3.5z" />
            <path fill="#4A90E2" d="M1 5.1C.4 6.2 0 7.5 0 9s.4 2.8 1 3.9l3-2.2c-.2-.6-.3-1.2-.3-1.7s.1-1.1.3-1.7L1 5.1z" />
            <path fill="#FBBC05" d="M9 3.6c1.3 0 2.5.5 3.4 1.3L15 2.3C13.4.9 11.4 0 9 0 5.5 0 2.5 2.3 1 5.1l3 2.3C5 5.1 6.8 3.6 9 3.6z" />
          </svg>
          Google ile giriş
        </button>
      </div>
    </main>
    <script type="module" src="/src/js/auth.js"></script>
  </body>
</html>
